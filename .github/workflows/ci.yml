name: QEVRYN Core CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Runtime
      uses: actions/setup-node@v4
      with:
        node-size: '20'
        cache: 'npm'

    - name: Install Project Dependencies
      run: npm ci || npm install

    - name: Run ESLint & Type Checks
      run: npm run lint

    - name: Compile and Bundle Workspace (React + Express Server)
      run: npm run build

    - name: Execute Full-Stack Core Integration Tests
      run: node test-runner.js
